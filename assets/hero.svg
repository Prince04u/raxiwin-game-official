<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="raxiwin mobile gaming experience illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff5f5"/><stop offset="1" stop-color="#ffe2e2"/></linearGradient>
    <linearGradient id="ph" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1a1a22"/><stop offset="1" stop-color="#0a0a10"/></linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e10b1f"/><stop offset="1" stop-color="#ff5566"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g opacity=".5">
